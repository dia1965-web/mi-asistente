<!DOCTYPE html>
<html lang="es">
<head>
<link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mi Asistente Personal</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#0083b0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

  <div class="app-container">
    
    <div class="header">
      <h1>📋 Mi Asistente Personal</h1>
      <div class="header-controls">
        <button id="theme-toggle" class="btn-theme" title="Cambiar tema">🌙</button>
        <button id="stats-btn" class="btn-icon" title="Ver estadísticas">📊</button>
      </div>
    </div>
    
    <div class="voice-card">
      <h3>Control por Voz</h3>
      <button id="btn-voz" class="mic-button" type="button">
        <span class="material-icons">mic</span>
      </button>
      <p id="texto-escuchado" class="status-text">Toca el micrófono y habla...</p>
    </div>

   <div class="quick-actions">

  <div class="action-card" id="tarjeta-pagar">
    <span class="material-icons">account_balance_wallet</span>
    <p>Pagar Facturas</p>
  </div>

  <div class="action-card" id="tarjeta-llamar">
    <span class="material-icons">phone_in_talk</span>
    <p>Llamar Contactos</p>
  </div>

</div>

    <hr style="border: 0; height: 1px; background: #ddd; margin: 25px 0;">

    <div id="stats-panel" class="stats-panel hidden">
      <h3>📈 Estadísticas</h3>
      <div class="stats-grid">
        <div class="stat">
          <span class="stat-value" id="total-tasks">0</span>
          <span class="stat-label">Total de Tareas</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="completed-tasks">0</span>
          <span class="stat-label">Completadas</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="pending-tasks">0</span>
          <span class="stat-label">Pendientes</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="overdue-tasks">0</span>
          <span class="stat-label">Atrasadas</span>
        </div>
      </div>
      <button id="export-btn" class="btn-export">📥 Exportar a CSV</button>
      <button id="close-stats" class="btn-close">✕</button>
    </div>
    
    <form id="task-form">
      <input type="text" id="task-title" placeholder="¿Qué tienes que hacer?" required>
      
      <select id="task-type">
        <option value="factura">💵 Pago de Factura</option>
        <option value="llamada">📞 Llamar a Contacto</option>
        <option value="tramite">🏢 Trámite de Oficina</option>
      </select>
      
      <div class="form-group">
  <label for="task-date">Fecha de Vencimiento:</label>
  <input type="date" id="task-date" required>
</div>

<div class="form-group">
  <label for="task-time">Hora de Vencimiento:</label>
  <input type="time" id="task-time" required>
</div>
      
      <button type="submit">Agregar Tarea</button>
    </form>

    <div class="search-container">
      <input type="text" id="search-input" placeholder="🔍 Buscar tareas...">
      <select id="filter-type">
        <option value="">Todas las tareas</option>
        <option value="factura">💵 Facturas</option>
        <option value="llamada">📞 Llamadas</option>
        <option value="tramite">🏢 Trámites</option>
      </select>
    </div>

    <h2>Mis Tareas Pendientes</h2>
    <ul id="task-list">
      </ul>
    
    <button id="clear-all-btn" class="btn-danger hidden">🗑️ Limpiar todo</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
